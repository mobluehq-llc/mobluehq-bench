name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: pytest -q
      - name: Smoke run (mock adapters)
        run: |
          bench run \
            --rail mock-rail \
            --baseline mock-baseline \
            --seed 42 \
            --output results/runs/ci-smoke \
            --max-samples 20
